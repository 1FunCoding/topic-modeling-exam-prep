<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Alpha and beta priors visual explanation</title>
  <desc id="desc">A roomy visual comparison of high and low alpha for document-topic mixtures and high and low beta for topic-word distributions.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#1f2d3d" flood-opacity="0.12"/>
    </filter>
    <style>
      .box { fill: #fff; stroke: #d7e1eb; stroke-width: 2; filter: url(#shadow); }
      .title { font: 800 34px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #17202a; }
      .label { font: 800 24px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #17202a; }
      .small { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #52677c; }
      .axis { stroke: #aab8c6; stroke-width: 2; }
      .blue { fill: #2567a9; }
      .green { fill: #2d7f46; }
      .red { fill: #a30f35; }
      .amber { fill: #a86508; }
    </style>
  </defs>

  <rect width="1400" height="760" fill="#f6f8fb"/>
  <text x="56" y="62" class="title">Why priors matter: alpha and beta shape the model</text>
  <text x="56" y="96" class="small">Priors control whether distributions are focused or spread out. They also smooth zero counts.</text>

  <g transform="translate(70 145)">
    <rect class="box" width="600" height="245" rx="10"/>
    <text x="30" y="48" class="label">Alpha: document-topic prior</text>
    <text x="30" y="82" class="small">What mixture of topics can a document have?</text>

    <g transform="translate(45 120)">
      <text x="0" y="0" class="small">Low alpha: focused document</text>
      <line x1="0" y1="98" x2="210" y2="98" class="axis"/>
      <rect x="25" y="18" width="38" height="80" class="blue"/>
      <rect x="88" y="63" width="38" height="35" class="green"/>
      <rect x="151" y="78" width="38" height="20" class="red"/>
    </g>

    <g transform="translate(335 120)">
      <text x="0" y="0" class="small">High alpha: mixed document</text>
      <line x1="0" y1="98" x2="210" y2="98" class="axis"/>
      <rect x="25" y="42" width="38" height="56" class="blue"/>
      <rect x="88" y="48" width="38" height="50" class="green"/>
      <rect x="151" y="54" width="38" height="44" class="red"/>
    </g>
  </g>

  <g transform="translate(730 145)">
    <rect class="box" width="600" height="245" rx="10"/>
    <text x="30" y="48" class="label">Beta: topic-word prior</text>
    <text x="30" y="82" class="small">How many words does a topic tend to use?</text>

    <g transform="translate(45 120)">
      <text x="0" y="0" class="small">Low beta: sharp keywords</text>
      <line x1="0" y1="98" x2="210" y2="98" class="axis"/>
      <rect x="16" y="15" width="30" height="83" class="red"/>
      <rect x="62" y="58" width="30" height="40" class="amber"/>
      <rect x="108" y="73" width="30" height="25" class="green"/>
      <rect x="154" y="83" width="30" height="15" class="blue"/>
    </g>

    <g transform="translate(335 120)">
      <text x="0" y="0" class="small">High beta: broad vocabulary</text>
      <line x1="0" y1="98" x2="210" y2="98" class="axis"/>
      <rect x="16" y="45" width="30" height="53" class="red"/>
      <rect x="62" y="49" width="30" height="49" class="amber"/>
      <rect x="108" y="53" width="30" height="45" class="green"/>
      <rect x="154" y="57" width="30" height="41" class="blue"/>
    </g>
  </g>

  <g transform="translate(120 465)">
    <rect class="box" width="1160" height="170" rx="10"/>
    <text x="34" y="46" class="label">Smoothing intuition</text>
    <text x="34" y="84" class="small">Without priors: a zero count can make a topic look impossible.</text>
    <text x="34" y="118" class="small">With alpha and beta: even weak topics keep a small chance, so Gibbs sampling can still explore alternatives.</text>
    <text x="34" y="150" class="small">中文: priors 给模型一点弹性，避免太早把可能的主题排除掉。</text>
  </g>
</svg>
