<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Case study visual for using topic modeling</title>
  <desc id="desc">A case study flow showing customer reviews becoming topics and then business actions.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#52677c"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#1f2d3d" flood-opacity="0.12"/>
    </filter>
    <style>
      .box { fill: #fff; stroke: #d7e1eb; stroke-width: 2; filter: url(#shadow); }
      .title { font: 800 30px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #17202a; }
      .label { font: 800 22px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #17202a; }
      .small { font: 500 17px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #52677c; }
      .tag { font: 800 16px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #fff; }
      .arrow { stroke: #52677c; stroke-width: 4; marker-end: url(#arrow); fill: none; }
    </style>
  </defs>

  <rect width="1200" height="560" fill="#f6f8fb"/>
  <text x="50" y="58" class="title">Case Study: customer reviews to decisions</text>
  <text x="50" y="90" class="small">Use this structure for any case study: goal, data, model, interpretation, action, limitation.</text>

  <g transform="translate(55 140)">
    <rect class="box" width="240" height="250" rx="8"/>
    <text x="24" y="42" class="label">Input reviews</text>
    <rect x="24" y="70" width="190" height="34" rx="5" fill="#f4f7fa" stroke="#d7e1eb"/>
    <text x="36" y="93" class="small">shipping was late</text>
    <rect x="24" y="118" width="190" height="34" rx="5" fill="#f4f7fa" stroke="#d7e1eb"/>
    <text x="36" y="141" class="small">price too high</text>
    <rect x="24" y="166" width="190" height="34" rx="5" fill="#f4f7fa" stroke="#d7e1eb"/>
    <text x="36" y="189" class="small">battery failed</text>
  </g>

  <path class="arrow" d="M315 265 H395"/>

  <g transform="translate(420 140)">
    <rect class="box" width="250" height="250" rx="8"/>
    <text x="24" y="42" class="label">Topic model</text>
    <text x="24" y="76" class="small">LDA learns:</text>
    <circle cx="70" cy="122" r="36" fill="#e9f1fb" stroke="#2567a9" stroke-width="3"/>
    <circle cx="132" cy="122" r="36" fill="#f8e9ed" stroke="#a30f35" stroke-width="3"/>
    <circle cx="101" cy="174" r="36" fill="#e4f5f6" stroke="#0b7f86" stroke-width="3"/>
    <text x="45" y="222" class="small">hidden themes</text>
  </g>

  <path class="arrow" d="M690 265 H770"/>

  <g transform="translate(795 105)">
    <rect class="box" width="350" height="320" rx="8"/>
    <text x="24" y="42" class="label">Interpreted topics</text>
    <rect x="24" y="68" width="120" height="32" rx="5" fill="#2567a9"/>
    <text x="40" y="90" class="tag">Shipping</text>
    <text x="160" y="90" class="small">late, delivery, tracking</text>
    <rect x="24" y="122" width="120" height="32" rx="5" fill="#a30f35"/>
    <text x="55" y="144" class="tag">Price</text>
    <text x="160" y="144" class="small">cost, expensive, refund</text>
    <rect x="24" y="176" width="120" height="32" rx="5" fill="#0b7f86"/>
    <text x="52" y="198" class="tag">Quality</text>
    <text x="160" y="198" class="small">broken, battery, defect</text>
    <line x1="24" y1="232" x2="320" y2="232" stroke="#d7e1eb" stroke-width="2"/>
    <text x="24" y="266" class="small">Action: prioritize the most frequent</text>
    <text x="24" y="294" class="small">and costly complaint topics.</text>
  </g>

  <g transform="translate(170 455)">
    <rect width="860" height="58" rx="8" fill="#fff6e9" stroke="#efd4a6" stroke-width="2"/>
    <text x="24" y="36" class="small">Exam move: always connect discovered topics to a decision, not just a list of words.</text>
  </g>
</svg>
