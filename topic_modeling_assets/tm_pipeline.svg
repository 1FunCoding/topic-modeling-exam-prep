<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Topic modeling pipeline</title>
  <desc id="desc">A visual pipeline from raw documents to preprocessing, LDA, topic outputs, interpretation, and decisions.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#52677c"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#1f2d3d" flood-opacity="0.12"/>
    </filter>
    <style>
      .box { fill: #fff; stroke: #d7e1eb; stroke-width: 2; filter: url(#shadow); }
      .title { font: 800 30px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #17202a; }
      .label { font: 800 23px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #17202a; }
      .small { font: 500 17px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #52677c; }
      .tag { font: 800 15px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #fff; }
      .arrow { stroke: #52677c; stroke-width: 4; marker-end: url(#arrow); fill: none; }
    </style>
  </defs>

  <rect width="1200" height="520" fill="#f6f8fb"/>
  <text x="50" y="60" class="title">Topic Modeling: from text to useful themes</text>
  <text x="50" y="92" class="small">中文: 从大量文本中发现隐藏主题，并把主题转化成可解释的 insight。</text>

  <g transform="translate(50 145)">
    <rect class="box" width="180" height="150" rx="8"/>
    <text x="24" y="45" class="label">Raw texts</text>
    <text x="24" y="75" class="small">emails</text>
    <text x="24" y="100" class="small">reviews</text>
    <text x="24" y="125" class="small">articles</text>
  </g>

  <path class="arrow" d="M250 220 H330"/>

  <g transform="translate(350 145)">
    <rect class="box" width="190" height="150" rx="8"/>
    <text x="24" y="42" class="label">Preprocess</text>
    <text x="24" y="74" class="small">tokenize</text>
    <text x="24" y="99" class="small">remove stopwords</text>
    <text x="24" y="124" class="small">lemmatize</text>
  </g>

  <path class="arrow" d="M560 220 H640"/>

  <g transform="translate(660 145)">
    <rect class="box" width="180" height="150" rx="8"/>
    <circle cx="62" cy="75" r="34" fill="#e4f5f6" stroke="#0b7f86" stroke-width="3"/>
    <circle cx="112" cy="75" r="34" fill="#f8e9ed" stroke="#a30f35" stroke-width="3"/>
    <circle cx="87" cy="108" r="34" fill="#e9f1fb" stroke="#2567a9" stroke-width="3"/>
    <text x="61" y="81" class="label" fill="#0b7f86">LDA</text>
    <text x="24" y="132" class="small">learn hidden topics</text>
  </g>

  <path class="arrow" d="M860 220 H940"/>

  <g transform="translate(960 105)">
    <rect class="box" width="190" height="230" rx="8"/>
    <text x="24" y="42" class="label">Outputs</text>
    <rect x="24" y="64" width="70" height="24" rx="4" fill="#2567a9"/>
    <text x="34" y="82" class="tag">Topic 1</text>
    <text x="24" y="112" class="small">top words</text>
    <text x="24" y="137" class="small">doc proportions</text>
    <rect x="24" y="158" width="70" height="24" rx="4" fill="#2d7f46"/>
    <text x="34" y="176" class="tag">Topic 2</text>
    <text x="24" y="206" class="small">representative docs</text>
  </g>

  <path class="arrow" d="M1055 350 V420 H155" marker-end="url(#arrow)"/>
  <g transform="translate(190 370)">
    <rect width="760" height="86" rx="8" fill="#fff6e9" stroke="#efd4a6" stroke-width="2"/>
    <text x="24" y="36" class="label">Data scientist interpretation</text>
    <text x="24" y="64" class="small">label topics, validate coherence, connect topic proportions to decisions</text>
  </g>
</svg>
